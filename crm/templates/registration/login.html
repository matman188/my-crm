<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in</title>
</head>
<body>
    <h1>Sign in</h1>

    {% if form.errors %}
        <p>Your username or password was not correct. Please try again.</p>
    {% endif %}

    {% if next %}
        <p>Please sign in to continue.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
</body>
</html>
