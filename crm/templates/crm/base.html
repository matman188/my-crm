<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CRM{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f1ea;
            --panel: #1d3557;
            --panel-accent: #457b9d;
            --text: #1f2933;
            --muted: #52606d;
            --surface: #ffffff;
            --border: #d9e2ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f6f1 0%, #eef4f8 100%);
            color: var(--text);
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 240px 1fr;
        }

        .sidebar {
            padding: 32px 20px;
            background: linear-gradient(180deg, var(--panel) 0%, #16324f 100%);
            color: #f8fbff;
            display: flex;
            flex-direction: column;
        }

        .brand {
            margin: 0 0 32px;
            font-size: 1.6rem;
        }

        .nav {
            display: grid;
            gap: 10px;
        }

        .nav a {
            display: block;
            padding: 12px 14px;
            border-radius: 10px;
            color: inherit;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav a:hover,
        .nav a:focus-visible {
            background: rgba(255, 255, 255, 0.16);
        }

        .content {
            padding: 32px;
        }

        .card {
            max-width: 960px;
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--surface);
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        .meta {
            color: var(--muted);
        }

        .message-list {
            margin: 0 0 20px;
            padding: 0;
            list-style: none;
        }

        .message {
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #edf7ed;
            color: #1f5130;
        }

        .message.error {
            background: #fdecec;
            color: #7a1f1f;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .form-grid p {
            margin: 0;
        }

        .form-grid input {
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
        }

        .form-grid input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }

        .form-grid ul {
            margin: 6px 0 0;
            padding-left: 18px;
            color: var(--muted);
        }

        .two-column {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
            gap: 24px;
            align-items: start;
        }

        .panel {
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fbfdff;
        }

        .panel h3 {
            margin-top: 0;
        }

        .user-list {
            margin: 0;
            padding-left: 18px;
        }

        .user-list li + li {
            margin-top: 10px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .toolbar h2 {
            margin: 0;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .button-link {
            display: inline-block;
            border-radius: 10px;
            padding: 10px 16px;
            background: var(--panel-accent);
            color: #fff;
            text-decoration: none;
        }

        .logout-form {
            margin-top: auto;
            padding-top: 24px;
        }

        .button {
            border: 0;
            border-radius: 10px;
            padding: 10px 16px;
            background: var(--panel-accent);
            color: #fff;
            cursor: pointer;
        }

        @media (max-width: 800px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding-bottom: 20px;
            }

            .two-column {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <h1 class="brand">My CRM</h1>
            <nav class="nav" aria-label="Primary">
                <a href="{% url 'home' %}">Dashboard</a>
                <a href="{% url 'customers' %}">Customers</a>
                <a href="{% url 'users' %}">Users</a>
            </nav>
            <form class="logout-form" method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="button" type="submit">Log out</button>
            </form>
        </aside>

        <main class="content">
            <section class="card">
                {% if messages %}
                    <ul class="message-list">
                        {% for message in messages %}
                            <li class="message{% if message.tags %} {{ message.tags }}{% endif %}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
</body>
</html>
